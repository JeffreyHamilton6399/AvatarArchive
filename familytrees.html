<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Family Trees · AvatarArchive</title>
  <meta name="theme-color" content="#04070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="icon" type="image/jpeg" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Cinzel+Decorative:wght@400;700;900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>

  .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 clamp(1rem,4vw,2.5rem);}

  /* Back */
  .back-link{position:fixed;top:18px;left:18px;z-index:50;display:inline-flex;align-items:center;gap:7px;font-family:'Cinzel',serif;font-size:.4rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(201,168,76,.75);background:rgba(4,7,13,.72);border:1px solid rgba(201,168,76,.2);border-radius:30px;padding:.48em 1em;text-decoration:none;transition:color .2s,border-color .2s,background .2s;backdrop-filter:blur(14px);}
  .back-link:hover{color:#d4a832;border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.08);}
  .back-link svg{width:12px;height:12px;fill:currentColor;}

  /* Hero */
  .hero{text-align:center;padding:clamp(4.5rem,9vh,7rem) 2rem clamp(1rem,1.5vh,1.8rem);width:100%;max-width:640px;animation:ft-in .7s cubic-bezier(.22,1,.36,1) both;}
  .hero-eyebrow{font-family:'Cinzel',serif;font-size:clamp(.38rem,.9vw,.5rem);letter-spacing:.45em;text-transform:uppercase;color:rgba(201,168,76,.55);margin-bottom:.9rem;}
  .hero-main{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(1.4rem,3vw,2.5rem);letter-spacing:.06em;background:linear-gradient(135deg,#f0dfa0 0%,#c9a84c 55%,#8a6a1a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;padding:.1em .3em .15em;display:inline-block;margin-bottom:.4rem;}
  .hero-sub{font-family:'Philosopher',serif;font-style:italic;font-size:clamp(.82rem,1.6vw,1rem);color:var(--muted);letter-spacing:.1em;}
  .hero-rule{width:60px;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.45),transparent);margin:1.2rem auto 0;}

  /* Tree tabs */
  .tree-tabs{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:.8rem 0 1.6rem;animation:ft-in .6s cubic-bezier(.22,1,.36,1) .1s both;}
  .tab-pill{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.18em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:.5em 1.1em;cursor:pointer;background:rgba(10,17,28,.6);color:var(--muted);transition:all .2s ease;backdrop-filter:blur(10px);}
  .tab-pill:hover{color:var(--white);border-color:rgba(255,255,255,.2);}
  .tab-pill.active{color:var(--deep);border-color:transparent;font-weight:700;}
  .tab-pill[data-tree="fire"].active  {background:#f97316;}
  .tab-pill[data-tree="aang"].active  {background:#f5c518;color:#1a1000;}
  .tab-pill[data-tree="water"].active {background:#4db8ff;color:#041020;}
  .tab-pill[data-tree="beifong"].active{background:#6abf69;color:#041208;}
  .tab-pill[data-tree="korra"].active {background:#9b7fe8;}

  /* Tree viewport */
  .tree-viewport{width:100%;overflow-x:auto;overflow-y:visible;padding-bottom:clamp(4rem,8vh,6rem);animation:ft-in .7s cubic-bezier(.22,1,.36,1) .18s both;}
  .tree-viewport::-webkit-scrollbar{height:3px;}
  .tree-viewport::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px;}

  .tree-wrap{display:none;min-width:max-content;padding:1rem 2rem 1rem;}
  .tree-wrap.active{display:block;}

  /* ──────────── FAMILY TREE CSS ──────────── */
  .ftree{
    display:flex;flex-direction:column;align-items:center;
    font-family:'Philosopher',serif;
  }

  /* Family node — wraps a person/couple and their subtree */
  .fn{display:flex;flex-direction:column;align-items:center;}

  /* Couple row */
  .couple{display:flex;align-items:center;gap:5px;}
  .mx{font-family:'Cinzel',serif;font-size:.55rem;color:var(--muted);padding:0 2px;opacity:.6;margin-top:-8px;}

  /* Vertical drop from parent to children rail */
  .drop{width:1px;height:28px;background:var(--tc,rgba(201,168,76,.3));}

  /* Children row */
  .cr{display:flex;align-items:flex-start;}

  /* Child branch */
  .cb{
    display:flex;flex-direction:column;align-items:center;
    padding:0 10px;position:relative;
  }
  /* Vertical from rail down to child */
  .cb::before{content:'';display:block;width:1px;height:28px;background:var(--tc,rgba(201,168,76,.3));}
  /* Horizontal rail */
  .cb::after{content:'';position:absolute;top:0;height:1px;background:var(--tc,rgba(201,168,76,.3));left:0;right:0;}
  .cb:first-child::after{left:50%;}
  .cb:last-child::after{right:50%;}
  .cb:only-child::after{display:none;}
  .cb:only-child::before{background:var(--tc,rgba(201,168,76,.3));}

  /* ──────────── PERSON NODE ──────────── */
  .pn{
    width:110px;border-radius:9px;padding:7px 9px 8px;
    background:rgba(10,17,28,.75);border:1px solid rgba(255,255,255,.07);
    cursor:pointer;position:relative;overflow:hidden;
    transition:transform .12s cubic-bezier(.3,0,.5,1),opacity .12s,border-color .2s,box-shadow .2s;
    text-align:center;
  }
  .pn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--ec,rgba(201,168,76,.4));}
  .pn:hover{border-color:rgba(var(--er,201,168,76),.35);box-shadow:0 0 16px rgba(var(--er,201,168,76),.12);}
  .pn:active{transform:scale(0.95);opacity:.82;}

  /* Element color variants */
  .pn.fire  {--ec:#f97316;--er:249,115,22;}
  .pn.water {--ec:#4db8ff;--er:77,184,255;}
  .pn.earth {--ec:#6abf69;--er:106,191,105;}
  .pn.air   {--ec:#f5c518;--er:245,197,24;}
  .pn.spirit{--ec:#9b7fe8;--er:155,127,232;}
  .pn.none  {--ec:rgba(107,138,171,.5);--er:107,138,171;}

  /* Deceased */
  .pn.dead{opacity:.52;}
  .pn.dead .pn-name::after{content:'†';font-size:.7em;margin-left:3px;opacity:.8;}

  /* Spouse — slightly muted */
  .pn.sp{opacity:.8;}

  .pn-top{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:2px;}
  .pn-dot{width:6px;height:6px;border-radius:50%;background:var(--ec,#c9a84c);flex-shrink:0;}
  .pn-name{font-family:'Cinzel',serif;font-weight:700;font-size:.5rem;letter-spacing:.05em;color:var(--white);line-height:1.2;text-align:left;}
  .pn-role{font-family:'Philosopher',serif;font-style:italic;font-size:.6rem;color:var(--muted);margin-bottom:2px;text-align:center;line-height:1.3;}
  .pn-dates{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.08em;color:rgba(107,138,171,.7);text-align:center;}

  /* Light themes */
  body.theme-parchment .pn,body.theme-water .pn,body.theme-earth .pn{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.1);}
  body.theme-parchment .pn-name,body.theme-water .pn-name,body.theme-earth .pn-name{color:var(--white);}

  /* ──────────── LEGEND BAR ──────────── */
  .legend{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center;padding:.4rem 0 1.2rem;animation:ft-in .5s cubic-bezier(.22,1,.36,1) .15s both;}
  .leg{display:inline-flex;align-items:center;gap:.35rem;font-family:'Cinzel',serif;font-size:.33rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* ──────────── SECTION LABELS ──────────── */
  .tree-label{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(201,168,76,.45);text-align:center;margin-bottom:.8rem;}

  /* Spacer between connected sub-trees */
  .tree-spacer{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.07),transparent);margin:2.5rem 0;}

  /* ──────────── DETAIL PANEL ──────────── */
  #detailPanel{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(6,10,20,.97);border-top:1px solid rgba(201,168,76,.15);border-radius:20px 20px 0 0;
    padding:1.1rem 1.4rem;padding-bottom:calc(1.4rem + env(safe-area-inset-bottom,0px));
    max-height:52vh;overflow-y:auto;
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    box-shadow:0 -10px 50px rgba(0,0,0,.6);
    transform:translateY(100%);transition:transform .36s cubic-bezier(.22,1,.36,1);
    display:flex;flex-direction:column;gap:.6rem;
  }
  #detailPanel.open{transform:translateY(0);}
  #detailPanel::-webkit-scrollbar{width:3px;}
  #detailPanel::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px;}

  .dp-handle{width:36px;height:3px;border-radius:3px;background:rgba(255,255,255,.13);margin:0 auto .3rem;cursor:pointer;flex-shrink:0;}
  .dp-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
  .dp-element{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dp-name-tag{font-family:'Cinzel',serif;font-weight:700;font-size:.42rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dp-color,#c9a84c);}
  .dp-dates{font-family:'Cinzel',serif;font-size:.34rem;letter-spacing:.12em;color:var(--muted);}
  .dp-title-txt{font-family:'Philosopher',serif;font-weight:700;font-size:clamp(.95rem,2vw,1.12rem);color:var(--white);line-height:1.35;}
  .dp-desc-txt{font-family:'Philosopher',serif;font-style:italic;font-size:clamp(.78rem,1.4vw,.9rem);color:rgba(172,188,208,.85);line-height:1.72;}
  .dp-family{font-family:'Cinzel',serif;font-size:.33rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:.2rem;}
  .dp-close{position:absolute;top:1rem;right:1.1rem;background:none;border:none;cursor:pointer;color:var(--muted);padding:.25em;display:flex;align-items:center;transition:color .15s;}
  .dp-close:hover{color:var(--white);}
  .dp-close svg{width:18px;height:18px;fill:currentColor;}

  body.panel-open .page{padding-bottom:56vh;}
  body.theme-parchment #detailPanel,body.theme-water #detailPanel,body.theme-earth #detailPanel{background:rgba(242,236,220,.98);}
  body.theme-parchment .dp-desc-txt,body.theme-water .dp-desc-txt,body.theme-earth .dp-desc-txt{color:var(--muted);}

  /* ──────────── PRESS FEEDBACK ──────────── */
  .tab-pill,.back-link,#settingsBtn,.theme-opt,.sp-ambient-row,.dp-handle,.dp-close{
    transition:transform .1s cubic-bezier(.3,0,.5,1),opacity .1s ease,background .2s,border-color .2s,color .2s;
  }
  .tab-pill:active{transform:scale(0.95);opacity:.8;}
  .back-link:active,.dp-close:active,.dp-handle:active{transform:scale(0.94);opacity:.75;}
  #settingsBtn:active{transform:scale(0.92);}
  .theme-opt:active,.sp-ambient-row:active{transform:scale(0.96);opacity:.8;}

  @keyframes ft-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

<script>
/* ── Person Data ── */
const PEOPLE = {};
let _pid = 0;

function p(name, title, element, born, died, desc, family) {
  const id = 'p'+ (_pid++);
  PEOPLE[id] = { name, title, element, born, died, desc, family };
  return id;
}

/* ══════════════════════════════════════
   TREE DEFINITIONS
══════════════════════════════════════ */

const TREES = {

  fire: {
    label: 'Fire Nation Royal Line',
    treeColor: 'rgba(249,115,22,0.35)',
    root: {
      pid: p('Fire Lord Sozin','Fire Lord · Architect of the War','fire','82 BG','20 AG',
        'The Fire Lord who weaponized his comet to massacre the Air Nomads and launch the Hundred Year War. He died at age 102, having watched the world burn for decades without finding the Avatar. His childhood best friend was Avatar Roku — whom he ultimately betrayed, watching him suffocate to death in volcanic fumes when he could have saved him.',
        'Fire Nation Royal Family'),
      spouse: {
        pid: p('Lady Sozin','Fire Lady','none','?','?',
          'Sozin\'s wife and the Fire Lady during his reign. She is the mother of Azulon. Little is recorded of her individually, but she is part of the bloodline that produces some of the most powerful firebenders in history.',
          'Fire Nation Royal Family')
      },
      children: [{
        pid: p('Fire Lord Azulon','Fire Lord','fire','0 AG','95 AG',
          'Son of Sozin, Azulon ruled the Fire Nation for 75 years — longer than any other wartime Fire Lord. Cold, authoritarian, and obsessed with maintaining the dynasty\'s power. He continued his father\'s campaign, oversaw the systematic raids on the Southern Water Tribe, and ordered the execution of his own grandson Zuko as punishment for Ozai\'s ambition. He was poisoned by Ursa before the order could be carried out.',
          'Fire Nation Royal Family'),
        spouse: {
          pid: p('Fire Lady Ilah','Fire Lady','none','?','?',
            'Azulon\'s wife and the mother of Iroh and Ozai. Little is recorded of her personally, though she raised two sons who became polar opposites in character — one who sought to conquer the world, and one who learned to let it go.',
            'Fire Nation Royal Family')
        },
        children: [
          {
            pid: p('General Iroh','Dragon of the West · Grand Lotus · Tea Master','fire','c. 45 AG',null,
              'The elder son of Azulon, Iroh was once the Fire Nation\'s most feared military commander — the man who breached Ba Sing Se\'s outer wall after a 600-day siege, a feat no army had ever achieved. His son Lu Ten\'s death during that siege shattered him. He abandoned the campaign and spent the following decades traveling, studying tea, mastering Pai Sho, and seeking wisdom under masters of every nation. He is the secret founder of the Order of the White Lotus. He can generate lightning and redirect it. He is Zuko\'s true father figure — and the moral heart of the entire series.',
              'Fire Nation Royal Family'),
            children: [
              {
                pid: p('Lu Ten','Captain · Son of Iroh','fire','?','95 AG',
                  'Iroh\'s only son, killed during the legendary Siege of Ba Sing Se at the outer wall. He died at the peak of his father\'s military glory, in the campaign Iroh had spent years building toward. His death was the pivot point that transformed Iroh from conqueror to sage — and left the Fire Nation throne open for Ozai to seize.',
                  'Fire Nation Royal Family')
              }
            ]
          },
          {
            pid: p('Fire Lord Ozai','Fire Lord · Phoenix King','fire','c. 55 AG',null,
              'The younger son of Azulon, Ozai manipulated events — through his wife Ursa — to seize the throne that should have gone to Iroh. He rules through fear, cruelty, and absolute certainty in his own superiority. He burned his 13-year-old son\'s face for speaking out of turn in a war meeting and banished him. He crowned himself Phoenix King and launched an airship armada to burn the entire Earth Kingdom to ash. Avatar Aang stripped him of his firebending permanently using energybending — the ancient art of touching a person\'s spirit directly.',
              'Fire Nation Royal Family'),
            spouse: {
              pid: p('Ursa','Princess · Exiled · "Noriko"','none','c. 64 AG',null,
                'Granddaughter of Avatar Roku, making Zuko and Azula direct descendants of the Avatar. She married Ozai in a political arrangement. To save Zuko from Azulon\'s execution order, Ursa struck a deal with Ozai: she would poison Azulon so Ozai could take the throne, and in exchange Ozai would spare Zuko\'s life. She was then banished from the Fire Nation. Years later, using a mask provided by the spirit Mother of Faces, she had her face and memories changed and lived as "Noriko" in the town of Hira\'a with her childhood love Ikem. Zuko eventually found her and had her memories restored.',
                'Fire Nation Royal Family')
            },
            children: [
              {
                pid: p('Fire Lord Zuko','Fire Lord · Blue Spirit · Tea Boy','fire','83 AG',null,
                  'Banished at 13 by his own father for speaking out of turn in a war council, Zuko spent three years hunting the Avatar to restore his honor. His journey — from desperate antagonist to the series\' greatest redemption arc — is one of the most celebrated in animation. He eventually joined Team Avatar, helped Aang master firebending by relearning it from the last dragons, and ascended the throne vowing to undo a century of war. He can generate lightning and redirect it.',
                  'Fire Nation Royal Family'),
                spouse: {
                  pid: p('Mai','Lady · Weapons Master','none','85 AG',null,
                    'Childhood friend of Azula and Zuko\'s girlfriend. Known for her lethal precision with thrown needles and knives concealed across her entire body. Calm, sardonic, and emotionally guarded — but far braver than she appears. She saved Zuko\'s life at the Boiling Rock prison, choosing him over Azula at enormous personal risk. She and Zuko reunite after the war.',
                    'Fire Nation Royal Family')

/* ══════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════ */

const EL_COLORS = {
  fire:'#f97316', water:'#4db8ff', earth:'#6abf69',
  air:'#f5c518', spirit:'#9b7fe8', none:'#6b8aab'
};

function renderTree(treeDef) {
  const { treeColor, root, label } = treeDef;
  return `<div class="tree-label">${label}</div><div class="ftree" style="--tc:${treeColor}">${renderNode(root, treeColor)}</div>`;
}

function renderNode(node, tc) {
  const main = PEOPLE[node.pid];
  const hasChildren = node.children && node.children.length > 0;

  let html = `<div class="fn">`;

  // Person card(s)
  if (node.spouse) {
    html += `<div class="couple">`;
    html += card(node.pid, false);
    html += `<div class="mx">×</div>`;
    html += card(node.spouse.pid, true);
    html += `</div>`;
  } else {
    html += card(node.pid, false);
  }

  // Children
  if (hasChildren) {
    html += `<div class="drop"></div><div class="cr">`;
    for (const child of node.children) {
      html += `<div class="cb">${renderNode(child, tc)}</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function card(pid, isSpouse) {
  const p = PEOPLE[pid];
  const ec = EL_COLORS[p.element] || '#6b8aab';
  const dead = p.died ? 'dead' : '';
  const sp = isSpouse ? 'sp' : '';
  const datesStr = p.born
    ? (p.died ? `${p.born} – ${p.died}` : `${p.born}`)
    : '';

  return `<div class="pn ${p.element||'none'} ${dead} ${sp}" data-pid="${pid}" style="--ec:${ec}">
    <div class="pn-top"><span class="pn-dot"></span><span class="pn-name">${p.name}</span></div>
    ${p.title ? `<div class="pn-role">${p.title.split('/')[0].trim()}</div>` : ''}
    ${datesStr ? `<div class="pn-dates">${datesStr}${!p.died && p.born ? ' →' : ''}</div>` : ''}
  </div>`;
}

// Render all trees
Object.entries(TREES).forEach(([key, tree]) => {
  const el = document.getElementById('tree-' + key);
  if (el) el.innerHTML = renderTree(tree);
});

const panel   = document.getElementById('detailPanel');
const dpEl    = document.getElementById('dpElement');
const dpName  = document.getElementById('dpName');
const dpDates = document.getElementById('dpDates');
const dpTitle = document.getElementById('dpTitle');
const dpDesc  = document.getElementById('dpDesc');
const dpFam   = document.getElementById('dpFamily');

function openPanel(pid) {
  const d = PEOPLE[pid];
  if (!d) return;
  const ec = EL_COLORS[d.element] || '#6b8aab';
  panel.style.setProperty('--dp-color', ec);
  dpEl.style.background = ec;
  dpName.textContent  = d.name;
  dpDates.textContent = d.born ? (d.died ? `${d.born} – ${d.died}` : `b. ${d.born}`) : '';
  dpTitle.textContent = d.title || '';
  dpDesc.textContent  = d.desc || '';
  dpFam.textContent   = d.family || '';
  panel.classList.add('open');
  document.body.classList.add('panel-open');
}
function closePanel() {
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
}

document.addEventListener('click', e => {
  const pn = e.target.closest('.pn');
  if (pn) { openPanel(pn.dataset.pid); return; }
});
document.getElementById('dpClose').addEventListener('click', closePanel);
document.getElementById('dpHandle').addEventListener('click', closePanel);
let _sy = 0;
panel.addEventListener('touchstart', e => { _sy = e.touches[0].clientY; }, { passive: true });
panel.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - _sy > 55) closePanel(); }, { passive: true });

  const pts=Array.from({length:12},(_,i)=>({x:Math.random()*1400,y:Math.random()*900,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,sz:Math.random()*7+5,sym:s[i%4],col:cl[i%4],al:Math.random()*.13+.03,ph:Math.random()*Math.PI*2}));
  let fr=0;
  function draw(){ctx.clearRect(0,0,W,H);fr++;pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-30)p.x=W+30;if(p.x>W+30)p.x=-30;if(p.y<-30)p.y=H+30;if(p.y>H+30)p.y=-30;ctx.font=`${p.sz}px serif`;ctx.fillStyle=p.col+(p.al*(0.6+0.4*Math.sin(fr*.011+p.ph)))+')';ctx.fillText(p.sym,p.x,p.y);});requestAnimationFrame(draw);}
  draw();
})();
</script>
